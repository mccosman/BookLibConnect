<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CYTD Score — AI Citation Visibility</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}

/* ── LAYOUT ── */
html,body{height:100%;background:#f1f5f9;color:#1e293b}
.app{display:flex;height:100vh;overflow:hidden}
.main-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}

/* ── SIDEBAR ── */
.sidebar{
  width:240px;flex-shrink:0;background:#0f172a;display:flex;
  flex-direction:column;height:100%;box-shadow:4px 0 24px rgba(0,0,0,.3);
  transition:transform .28s ease;z-index:50;
}
.logo{padding:20px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:12px}
.logo-icon{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#6366f1,#4338ca);
  display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:15px;flex-shrink:0}
.logo-text{font-size:15px;font-weight:700;color:#fff;letter-spacing:-.3px}
.logo-sub{font-size:11px;color:#475569;margin-top:1px}
nav{flex:1;overflow-y:auto;padding:8px 0}
.nav-section{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;
  color:#334155;padding:16px 20px 4px}
.nav-btn{display:flex;align-items:center;gap:10px;padding:9px 16px;margin:1px 8px;
  width:calc(100% - 16px);background:none;border:none;border-radius:7px;cursor:pointer;
  font-size:13.5px;color:#94a3b8;text-align:left;transition:all .15s}
.nav-btn:hover{background:rgba(255,255,255,.07);color:#e2e8f0}
.nav-btn.active{background:rgba(99,102,241,.22);color:#a5b4fc;font-weight:600}
.status-pill{margin:12px;padding:12px 14px;background:rgba(99,102,241,.15);border-radius:12px}
.status-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:#34d399;margin-right:6px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.status-label{font-size:12px;font-weight:600;color:#818cf8}
.status-sub{font-size:11px;color:#475569;margin-top:3px}

/* ── MOBILE HEADER ── */
.mob-header{display:none;background:#fff;border-bottom:1px solid #e2e8f0;
  padding:12px 16px;align-items:center;justify-content:space-between;flex-shrink:0}
.mob-logo{display:flex;align-items:center;gap:8px;font-size:15px;font-weight:700;color:#1e293b}
.mob-logo-icon{width:28px;height:28px;border-radius:8px;background:#6366f1;display:flex;
  align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:12px}
.mob-menu-btn{background:#f1f5f9;border:none;border-radius:8px;padding:8px 10px;font-size:18px;cursor:pointer}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:40}

/* ── MAIN CONTENT ── */
#main{flex:1;overflow-y:auto}
.page{max-width:1100px;margin:0 auto;padding:32px 28px}
.page-sm{max-width:800px;margin:0 auto;padding:32px 28px}

/* ── TYPOGRAPHY ── */
.page-title{font-size:26px;font-weight:800;color:#0f172a;margin-bottom:8px;letter-spacing:-.4px}
.page-desc{font-size:14px;color:#64748b;line-height:1.6;max-width:600px;margin-bottom:32px}

/* ── CARDS ── */
.card{background:#fff;border-radius:14px;border:1px solid #e2e8f0;padding:22px;transition:box-shadow .2s}
.card:hover{box-shadow:0 4px 20px rgba(0,0,0,.07)}
.card-title{font-size:14px;font-weight:700;color:#1e293b;margin-bottom:4px}
.card-sub{font-size:12px;color:#94a3b8;margin-bottom:16px}

/* ── GRID HELPERS ── */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.grid6{display:grid;grid-template-columns:repeat(6,1fr);gap:10px}

/* ── SCORE RING ── */
.score-ring-wrap{display:flex;flex-direction:column;align-items:center;gap:14px}
.score-ring{
  width:168px;height:168px;border-radius:50%;
  background:conic-gradient(#6366f1 calc(var(--p,74)*1%),#1e293b calc(var(--p,74)*1%));
  display:flex;align-items:center;justify-content:center;
}
.score-ring-inner{
  width:136px;height:136px;border-radius:50%;background:#fff;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
}
.score-big{font-size:38px;font-weight:800;color:#0f172a;line-height:1}
.score-of{font-size:12px;color:#94a3b8;margin-top:3px}
.score-badge{font-size:11px;font-weight:700;color:#059669;background:#d1fae5;
  border:1px solid #a7f3d0;border-radius:20px;padding:4px 12px}

/* ── PILLAR CARDS ── */
.pillar-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.pillar-val{font-size:30px;font-weight:800;color:#0f172a;margin-bottom:6px}
.pillar-val span{font-size:14px;color:#94a3b8;font-weight:400}
.bar{height:6px;border-radius:3px;background:#f1f5f9;overflow:hidden;margin:6px 0 8px}
.bar-fill{height:100%;border-radius:3px}
.delta-pos{font-size:11px;font-weight:700;color:#059669}
.delta-warn{font-size:11px;font-weight:700;color:#d97706}
.pillar-icon{font-size:20px;float:right}
.pillar-label{font-size:13px;font-weight:700;color:#334155}
.pillar-sublabel{font-size:11px;color:#94a3b8;margin-top:1px;margin-bottom:14px}

/* ── PLATFORM TILES ── */
.platform-tile{
  border-radius:12px;border:1px solid #e2e8f0;padding:12px 8px;
  text-align:center;transition:all .2s;cursor:default;
}
.platform-tile:hover{box-shadow:0 4px 12px rgba(0,0,0,.08)}
.platform-tile.good{border-color:#a7f3d0;background:#f0fdf4}
.platform-tile.mid{border-color:#fde68a;background:#fffbeb}
.platform-tile.low{border-color:#fecaca;background:#fff1f2}
.platform-emoji{font-size:22px;display:block;margin-bottom:4px}
.platform-name{font-size:11px;font-weight:700;color:#334155}
.platform-score{font-size:18px;font-weight:800;margin-top:4px;line-height:1}
.platform-trend{font-size:10px;font-weight:700;margin-top:2px}
.good .platform-score{color:#065f46}.good .platform-trend{color:#059669}
.mid .platform-score{color:#92400e}.mid .platform-trend{color:#d97706}
.low .platform-score{color:#991b1b}.low .platform-trend{color:#dc2626}

/* ── CTA BANNER ── */
.cta-banner{
  background:linear-gradient(135deg,#4f46e5,#4338ca);border-radius:14px;
  padding:24px 28px;display:flex;align-items:center;justify-content:space-between;gap:16px;
  margin-top:20px;box-shadow:0 8px 24px rgba(79,70,229,.3);
}
.cta-title{font-size:16px;font-weight:700;color:#fff;margin-bottom:4px}
.cta-sub{font-size:13px;color:#c7d2fe}
.cta-btn{background:#fff;color:#4338ca;font-size:13px;font-weight:700;
  border:none;border-radius:9px;padding:10px 20px;cursor:pointer;white-space:nowrap;transition:.15s}
.cta-btn:hover{background:#eef2ff}

/* ── SECTION ROW ── */
.row-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}

/* ── CHART ── */
.chart-box{position:relative;height:260px;width:100%}

/* ── PROGRESS BARS ── */
.prog-row{margin-bottom:14px}
.prog-label{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px}
.prog-name{font-weight:600;color:#475569}
.prog-val{color:#94a3b8;font-weight:600}

/* ── MODEL CARDS ── */
.model-score-num{font-size:24px;font-weight:800}
.model-badge{font-size:11px;font-weight:600;padding:2px 8px;border-radius:12px;display:inline-block;margin-top:4px}
.badge-good{background:#d1fae5;color:#065f46}
.badge-mid{background:#fef3c7;color:#92400e}
.badge-low{background:#fee2e2;color:#991b1b}
.model-insight{font-size:12px;color:#64748b;line-height:1.55;margin-top:10px}

/* ── COMPETITOR ── */
.comp-insight{border-radius:12px;padding:16px 18px;margin-bottom:0}
.ci-emerald{border:1px solid #a7f3d0;background:#f0fdf4}
.ci-orange{border:1px solid #fed7aa;background:#fff7ed}
.ci-blue{border:1px solid #bfdbfe;background:#eff6ff}
.ci-purple{border:1px solid #ddd6fe;background:#f5f3ff}
.ci-title{font-size:13px;font-weight:700;display:flex;align-items:center;gap:6px;margin-bottom:6px}
.ci-body{font-size:12.5px;line-height:1.55}
.ci-emerald .ci-title{color:#065f46}.ci-emerald .ci-body{color:#047857}
.ci-orange .ci-title{color:#9a3412}.ci-orange .ci-body{color:#c2410c}
.ci-blue .ci-title{color:#1e40af}.ci-blue .ci-body{color:#1d4ed8}
.ci-purple .ci-title{color:#5b21b6}.ci-purple .ci-body{color:#6d28d9}

/* ── TASKS ── */
.task-gen-box{
  background:#1e1b4b;border-radius:14px;padding:22px 24px;margin-bottom:20px;
}
.task-gen-title{color:#fff;font-size:15px;font-weight:700;margin-bottom:4px}
.task-gen-sub{color:#a5b4fc;font-size:13px;margin-bottom:14px}
.task-gen-row{display:flex;gap:10px;flex-wrap:wrap}
.task-input{
  flex:1;min-width:160px;padding:10px 14px;border-radius:9px;
  background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);
  color:#fff;font-size:13px;outline:none;
}
.task-input::placeholder{color:#818cf8}
.task-input:focus{border-color:#818cf8}
.task-gen-btn{
  background:#fff;color:#4338ca;font-size:13px;font-weight:700;
  border:none;border-radius:9px;padding:10px 18px;cursor:pointer;white-space:nowrap;
}
.key-note{font-size:12px;color:#818cf8;margin-top:8px}
.task-card{
  background:#fff;border-radius:12px;border:1px solid #e2e8f0;padding:18px 20px;
  display:flex;gap:16px;align-items:flex-start;justify-content:space-between;
  transition:box-shadow .2s;margin-bottom:10px;
}
.task-card:hover{box-shadow:0 3px 14px rgba(0,0,0,.07)}
.task-title{font-size:14px;font-weight:700;color:#1e293b;margin-bottom:6px}
.task-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:6px}
.tag{font-size:11px;font-weight:600;padding:2px 8px;border-radius:10px}
.tag-high{background:#fee2e2;color:#991b1b}
.tag-med{background:#ffedd5;color:#9a3412}
.tag-vis{background:#e0e7ff;color:#3730a3}
.tag-comp{background:#d1fae5;color:#065f46}
.tag-rel{background:#fef3c7;color:#92400e}
.tag-plat{background:#f1f5f9;color:#475569}
.task-desc{font-size:12.5px;color:#64748b;line-height:1.55}
.task-actions{display:flex;flex-direction:column;gap:6px;align-items:flex-end;flex-shrink:0}
.status-btn{
  font-size:12.5px;font-weight:600;padding:8px 16px;border-radius:9px;
  border:1px solid #e2e8f0;background:#fff;color:#64748b;
  cursor:pointer;white-space:nowrap;min-width:110px;text-align:center;transition:.15s;
}
.status-btn:hover{border-color:#94a3b8}
.status-btn.inprogress{background:#fffbeb;border-color:#fde68a;color:#92400e}
.status-btn.done{background:#f0fdf4;border-color:#a7f3d0;color:#065f46}
.copy-btn{font-size:11.5px;color:#94a3b8;background:none;border:none;cursor:pointer;padding:2px 6px;transition:.15s}
.copy-btn:hover{color:#6366f1}

/* ── SIMULATOR / OPTIMIZER ── */
.sim-box{background:#fff;border-radius:14px;border:1px solid #e2e8f0;padding:22px}
.sim-label{font-size:13px;font-weight:700;color:#334155;margin-bottom:8px;display:block}
textarea{
  width:100%;padding:12px 14px;border:1px solid #e2e8f0;border-radius:10px;
  font-size:13.5px;color:#334155;resize:none;outline:none;line-height:1.55;
  transition:border .15s;font-family:inherit;
}
textarea:focus{border-color:#6366f1;box-shadow:0 0 0 3px rgba(99,102,241,.1)}
.chip-row{display:flex;flex-wrap:wrap;gap:7px;margin:10px 0 14px}
.chip{
  font-size:11.5px;background:#f1f5f9;border:none;border-radius:20px;
  padding:5px 12px;cursor:pointer;color:#475569;transition:.15s;
}
.chip:hover{background:#e0e7ff;color:#4338ca}
.run-btn{
  background:#1e293b;color:#fff;border:none;border-radius:10px;
  padding:10px 22px;font-size:13px;font-weight:600;cursor:pointer;
  display:inline-flex;align-items:center;gap:7px;transition:.15s;
}
.run-btn:hover{background:#0f172a}
.run-btn.indigo{background:#6366f1}
.run-btn.indigo:hover{background:#4f46e5}
.output-box{
  background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;padding:16px;
  font-size:13px;color:#334155;white-space:pre-wrap;line-height:1.65;min-height:80px;
  font-family:ui-monospace,monospace;
}
.output-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.output-label{font-size:11px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.06em;
  display:flex;align-items:center;gap:6px}
.output-dot{width:7px;height:7px;border-radius:50%;background:#34d399;display:inline-block}
.copy-small{
  font-size:11.5px;background:#fff;border:1px solid #e2e8f0;border-radius:7px;
  padding:5px 10px;cursor:pointer;color:#64748b;display:flex;align-items:center;gap:4px;transition:.15s;
}
.copy-small:hover{background:#f1f5f9}
.key-warning{font-size:12px;color:#94a3b8;margin-top:8px}
.key-warning a{color:#6366f1;cursor:pointer;text-decoration:underline}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.flex-col-card{background:#fff;border-radius:14px;border:1px solid #e2e8f0;padding:18px;
  display:flex;flex-direction:column;gap:0}

/* ── LLMs.txt ── */
.info-box{
  background:#eef2ff;border:1px solid #c7d2fe;border-radius:12px;
  padding:14px 16px;display:flex;gap:10px;margin-bottom:20px;
}
.info-box-icon{font-size:16px;flex-shrink:0;margin-top:1px}
.info-box-title{font-size:13px;font-weight:700;color:#3730a3;margin-bottom:3px}
.info-box-body{font-size:12.5px;color:#4338ca;line-height:1.55}
.info-box-body code{background:#c7d2fe;padding:1px 5px;border-radius:4px;font-family:monospace;font-size:11.5px}
.form-label{font-size:12px;font-weight:700;color:#475569;margin-bottom:5px;display:block}
input[type=text]{
  width:100%;padding:10px 13px;border:1px solid #e2e8f0;border-radius:9px;
  font-size:13px;color:#334155;outline:none;transition:.15s;
}
input[type=text]:focus{border-color:#6366f1;box-shadow:0 0 0 3px rgba(99,102,241,.1)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px}
.terminal{
  background:#0f172a;border-radius:12px;padding:18px 20px;
}
.terminal-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.terminal-dots{display:flex;gap:6px}
.terminal-dot{width:11px;height:11px;border-radius:50%}
.terminal-filename{font-size:12px;color:#64748b;font-family:monospace}
pre{font-size:12.5px;color:#6ee7b7;font-family:ui-monospace,monospace;white-space:pre-wrap;line-height:1.6}
.terminal-copy{
  font-size:11.5px;background:rgba(255,255,255,.1);border:none;border-radius:7px;
  padding:5px 10px;cursor:pointer;color:#94a3b8;display:flex;align-items:center;gap:4px;transition:.15s;
}
.terminal-copy:hover{background:rgba(255,255,255,.18);color:#e2e8f0}
.upload-note{font-size:12px;color:#94a3b8;margin-top:10px}
.upload-note strong{color:#64748b}

/* ── AI GUIDE ── */
.guide-wrap{display:flex;flex-direction:column;height:100%}
.guide-header{padding:24px 28px 16px;border-bottom:1px solid #f1f5f9;flex-shrink:0}
.guide-messages{flex:1;overflow-y:auto;padding:20px 28px;display:flex;flex-direction:column;gap:14px}
.msg-row{display:flex;gap:10px}
.msg-row.user{flex-direction:row-reverse}
.msg-avatar{
  width:32px;height:32px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;
}
.avatar-ai{background:#6366f1;color:#fff}
.avatar-you{background:#e2e8f0;color:#475569}
.msg-bubble{
  max-width:82%;padding:13px 15px;font-size:13.5px;line-height:1.65;
  border-radius:4px 14px 14px 14px;background:#f1f5f9;color:#334155;
}
.msg-bubble.user{
  border-radius:14px 4px 14px 14px;background:#6366f1;color:#fff;
}
.msg-bubble strong{color:#1e293b}
.msg-bubble.user strong{color:#e0e7ff}
.msg-bubble code{background:#e2e8f0;padding:1px 5px;border-radius:4px;font-size:12px;font-family:monospace}
.msg-bubble ul{padding-left:16px;margin:6px 0}
.msg-bubble li{margin-bottom:3px}
.faq-chips{padding-left:42px;display:flex;flex-wrap:wrap;gap:7px}
.faq-chip{
  font-size:12px;background:#fff;border:1px solid #e2e8f0;border-radius:20px;
  padding:6px 13px;cursor:pointer;color:#475569;transition:.15s;
}
.faq-chip:hover{border-color:#a5b4fc;background:#eef2ff;color:#4338ca}
.guide-input-row{
  flex-shrink:0;padding:14px 28px 20px;border-top:1px solid #f1f5f9;
  background:rgba(255,255,255,.9);backdrop-filter:blur(6px);display:flex;gap:8px;
}
.guide-input{
  flex:1;padding:11px 16px;border:1px solid #e2e8f0;border-radius:12px;
  font-size:13.5px;color:#334155;outline:none;transition:.15s;
}
.guide-input:focus{border-color:#6366f1;box-shadow:0 0 0 3px rgba(99,102,241,.1)}
.guide-send{
  background:#6366f1;color:#fff;border:none;border-radius:12px;
  padding:11px 20px;font-size:13px;font-weight:700;cursor:pointer;transition:.15s;
}
.guide-send:hover{background:#4f46e5}
.dot-loader span{
  display:inline-block;width:7px;height:7px;border-radius:50%;
  background:#94a3b8;margin:0 2px;
  animation:dotpulse 1.4s infinite ease-in-out;
}
.dot-loader span:nth-child(2){animation-delay:.2s}
.dot-loader span:nth-child(3){animation-delay:.4s}
@keyframes dotpulse{0%,80%,100%{opacity:.2;transform:scale(.8)}40%{opacity:1;transform:scale(1)}}

/* ── ANIMATIONS ── */
@keyframes fadeup{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeup .22s ease-out}

/* ── LOADING / DISABLED ── */
@keyframes shimmer{0%,100%{opacity:1}50%{opacity:.4}}
.loading{animation:shimmer 1.2s infinite}

/* ── MOBILE RESPONSIVE ── */
@media(max-width:768px){
  .sidebar{position:fixed;top:0;left:0;height:100%;transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .mob-header{display:flex}
  .grid2,.grid3,.pillar-grid,.two-col,.form-grid{grid-template-columns:1fr}
  .grid4,.grid6{grid-template-columns:repeat(3,1fr)}
  .cta-banner{flex-direction:column;align-items:flex-start}
  .page,.page-sm{padding:20px 16px}
  .task-card{flex-direction:column}
  .task-actions{flex-direction:row;align-items:center}
  .guide-header,.guide-messages,.guide-input-row{padding-left:16px;padding-right:16px}
}
@media(max-width:480px){
  .grid4,.grid6{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body>

<div class="app">

<!-- ═══════════════ SIDEBAR ═══════════════ -->
<aside class="sidebar" id="sidebar">
  <div class="logo">
    <div class="logo-icon">C</div>
    <div>
      <div class="logo-text">CYTD Score</div>
      <div class="logo-sub">AI Citation Visibility</div>
    </div>
  </div>
  <nav>
    <div class="nav-section">Analytics</div>
    <button class="nav-btn active" id="nav-overview" onclick="go('overview')">📊 CYTD Score</button>
    <button class="nav-btn" id="nav-models" onclick="go('models')">🤖 AI Model Coverage</button>
    <button class="nav-btn" id="nav-competitors" onclick="go('competitors')">⚖️ Competitor Benchmarks</button>
    <div class="nav-section">Optimize</div>
    <button class="nav-btn" id="nav-tasks" onclick="go('tasks')">⚡ Optimization Tasks</button>

function md(t){
  return t
    .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
    .replace(/`(.*?)`/g,'<code>$1</code>')
    .replace(/^[-•] (.+)$/gm,'<li>$1</li>')
    .replace(/(<li>[\s\S]*?<\/li>)/g,'<ul>$1</ul>')
    .replace(/\n\n/g,'</p><p style="margin-top:8px">')
    .replace(/^/,'<p>').replace(/$/,'</p>');
}
function clip(text,btn,ok='✅ Copied'){
  const orig=btn.innerHTML;
  (navigator.clipboard?navigator.clipboard.writeText(text):Promise.resolve(document.execCommand('copy',false,text)))
    .catch(()=>{const t=document.createElement('textarea');t.value=text;t.style.position='fixed';t.style.left='-9999px';document.body.appendChild(t);t.select();document.execCommand('copy');document.body.removeChild(t);});
  btn.innerHTML=ok;setTimeout(()=>btn.innerHTML=orig,2000);
}

/* ─── CHAT LOGIC ─────────────────────────────────────────── */
const FAQ={
'What is a CYTD Score?':`**CYTD Score** is your brand's AI visibility health score from 0–100. It combines three pillars:

- **Visibility (84)** — How often AI models mention or recommend you
- **Compliance (71)** — Schema markup, LLMs.txt, structured data, content accuracy
- **Relevance (67)** — How closely your content matches what users actually ask AI

Calculated monthly from 10,000+ test queries across ChatGPT, Claude, Gemini, Perplexity, Grok, and Bing Copilot.

A score above 80 means strong AI presence. Below 50 means competitors are being recommended instead of you.`,

'How is this different from SEO?':`Traditional **SEO** gets you on page 1 of Google when someone types a keyword.

**AEO (Answer Engine Optimization)** — what CYTD measures — gets AI to *recommend your brand* when someone asks "what's the best tool for X?"

Key differences:
- **SEO** → users click blue links. **AEO** → AI gives a direct recommendation with your name cited
- **SEO** focuses on keywords & backlinks. **AEO** focuses on information density, entity clarity, and AI-readable structure
- **SEO** shows rankings. **AEO** shows mention frequency and sentiment

The stakes: ChatGPT handles 2B+ queries/day, and Google search volume is projected to drop 25% by 2026 as AI grows.`,

'What are Visibility, Compliance & Relevance?':`The **three pillars** of your CYTD Score:

**👁️ Visibility (84/100)**
How often AI mentions your brand. Improved by: third-party citations, directory listings, press coverage, social proof.

**✅ Compliance (71/100)**
How well your site signals trust to AI systems. Improved by: LLMs.txt, FAQ schema markup, structured data, fixing factual errors. Most actionable pillar.

**🎯 Relevance (67/100)**
How well your content matches user questions. Improved by: comprehensive FAQ pages, comparison content, use-case landing pages.

Your **Relevance (67) is the lowest** — this is where you'll see the fastest gains. Focus here first.`,

'What is LLMs.txt?':`**LLMs.txt** is an emerging standard — like robots.txt, but for AI crawlers.

You place it at **yourdomain.com/llms.txt** and it tells AI systems:
- What your brand does and who you serve
- Which pages are authoritative
- Your key products and differentiators
- Content usage permissions

Several AI systems — Perplexity, Anthropic's crawlers, and others — already check this file. Having one directly improves how AI describes your brand.

Use the **LLMs.txt Builder** in the sidebar — it takes 2 minutes and needs no API key.`,

'How fast can my score improve?':`Based on typical timelines:

- **Technical fixes** (LLMs.txt, schema markup): **2–4 weeks** as AI crawlers re-index
- **Content optimization** (restructuring pages): **4–8 weeks** for LLMs to incorporate
- **Authority building** (citations, directories): **30–60 days** for movement

Your biggest quick win: **Relevance (67)** — adding FAQ and comparison content can push this to 75+ within 6 weeks, lifting your CYTD Score from 74 → ~82.

Check the **Optimization Tasks** section for a prioritized action list.`,

'Which AI engine to focus on first?':`Based on your data, here's the priority order:

1. **ChatGPT (88)** — Already strong. Fix the stale pricing data first — it has the largest user base.

2. **Gemini (63)** — Growing fastest (powers Google AI Overview). More third-party citations will help here.

3. **Perplexity (52)** — High-intent users. LLMs.txt + FAQ schema would push this into the 70s quickly.

4. **Grok + Bing Copilot** (both below 50) — Lower priority. Fix the top three first.

Platforms above 70 need maintenance. Below 50 is where new content and technical fixes move the needle most.`
};

function appendMsg(text,role,isMd=false){
  const c=$('gmsgs');if(!c)return;
  const div=document.createElement('div');
  div.className='msg-row fade-in'+(role==='user'?' user':'');
  if(role==='user'){
    div.innerHTML=`<div class="msg-avatar avatar-you" style="font-size:9px">You</div><div class="msg-bubble user">${esc(text)}</div>`;
  } else {
    div.innerHTML=`<div class="msg-avatar avatar-ai">C</div><div class="msg-bubble">${isMd?md(text):`<p>${esc(text)}</p>`}</div>`;
  }
  c.appendChild(div);c.scrollTop=c.scrollHeight;
}
function appendLoader(){
  const c=$('gmsgs');if(!c)return;
  const div=document.createElement('div');div.className='msg-row';div.id='gloader';
  div.innerHTML=`<div class="msg-avatar avatar-ai">C</div><div class="msg-bubble"><div class="dot-loader"><span></span><span></span><span></span></div></div>`;
  c.appendChild(div);c.scrollTop=c.scrollHeight;
}
async function askGuide(q){
  const chips=$('faq-chips');if(chips)chips.remove();
  appendMsg(q,'user');
  if(FAQ[q]){appendLoader();await new Promise(r=>setTimeout(r,380));$('gloader')?.remove();appendMsg(FAQ[q],'ai',true);}
  else await gChat(q);
}
async function sendGuide(){
  const inp=$('g-input');const q=inp?.value.trim();if(!q)return;
  inp.value='';const chips=$('faq-chips');if(chips)chips.remove();
  appendMsg(q,'user');
  if(FAQ[q]){appendLoader();await new Promise(r=>setTimeout(r,380));$('gloader')?.remove();appendMsg(FAQ[q],'ai',true);}
  else await gChat(q);
}
async function gChat(q){
  appendLoader();
  const sys=`You are an expert in AEO (Answer Engine Optimization) inside the CYTD Score dashboard. CYTD measures brand visibility in AI responses across ChatGPT, Claude, Gemini, Perplexity, Grok, and Bing Copilot via three pillars: Visibility, Compliance, Relevance. User's CYTD Score: 74/100. Answer concisely and practically under 200 words. Use markdown for formatting.`;
  try{
    const r=await gemini({contents:[{role:'user',parts:[{text:q}]}],systemInstruction:{parts:[{text:sys}]}});
    $('gloader')?.remove();
    const t=r.candidates?.[0]?.content?.parts?.[0]?.text;
    appendMsg(t||"I couldn't get a response right now. Try again.",'ai',true);
  }catch(e){
    $('gloader')?.remove();
    appendMsg(e.noKey?'No API key set. The pre-built questions above work offline, or add a Gemini key to ask anything.':'Connection failed. Please try again.','ai');
  }
}

/* ─── TASK ACTIONS ───────────────────────────────────────── */
async function genTasks(){
  const brand=$('brand-in')?.value.trim();
  const ind=$('ind-in')?.value.trim();
  const btn=$('btn-gen');
  if(!brand||!ind){alert('Please enter both brand and industry.');return;}
  const orig=btn.innerHTML;btn.innerHTML='Generating…';btn.disabled=true;
  try{
    const r=await gemini({
      contents:[{parts:[{text:`AEO expert: For brand "${brand}" in "${ind}", generate 5 specific actionable tasks to improve AI citation visibility across ChatGPT, Claude, Gemini, Perplexity, Grok. Return JSON array.`}]}],
      generationConfig:{responseMimeType:'application/json',responseSchema:{type:'ARRAY',items:{type:'OBJECT',properties:{id:{type:'INTEGER'},title:{type:'STRING'},impact:{type:'STRING'},platform:{type:'STRING'},pillar:{type:'STRING'},status:{type:'STRING'},desc:{type:'STRING'}}}}}
    });
    const tasks=JSON.parse(r.candidates[0].content.parts[0].text);
    let mx=Math.max(...D.tasks.map(t=>t.id),0);
    tasks.forEach(t=>{t.id=++mx;t.status='Pending';});
    D.tasks=tasks;$('taskList').innerHTML=renderTasks(D.tasks);
  }catch(e){
    if(e.noKey)alert('Add a Gemini API key to generate AI tasks.');
    else $('taskList').innerHTML='<div style="color:#ef4444;padding:16px;font-size:13px">Generation failed. Please try again.</div>';
  }finally{btn.innerHTML=orig;btn.disabled=false;}
}

function cycleTask(id,btn){
  const t=D.tasks.find(t=>t.id===id);if(!t)return;
  t.status=t.status==='Pending'?'In Progress':t.status==='In Progress'?'Completed':'Pending';
  btn.className=statusBtnClass(t.status);btn.innerHTML=statusBtnText(t.status);
}
function copyTask(id,btn){
  const t=D.tasks.find(t=>t.id===id);if(!t)return;
  clip(`AEO Task: ${t.title}\nImpact: ${t.impact} | Pillar: ${t.pillar} | Platform: ${t.platform}\n\n${t.desc}`,btn,'✅ Copied');
}

/* ─── SIMULATOR ──────────────────────────────────────────── */
async function runSim(){
  const p=$('sim-prompt')?.value.trim();const btn=$('btn-sim');
  const res=$('sim-result');const out=$('sim-out');if(!p)return;
  btn.innerHTML='Simulating…';btn.disabled=true;
  res.style.display='block';out.innerHTML='<span class="loading" style="color:#94a3b8">Model is generating a response…</span>';
  try{
    const r=await gemini({contents:[{parts:[{text:p}]}]});
    out.innerText=r.candidates?.[0]?.content?.parts?.[0]?.text||'No response generated.';
  }catch(e){
    out.innerHTML=e.noKey?'<span style="color:#f59e0b">Add a Gemini API key to run simulations. <a onclick="addKey()" style="color:#6366f1;cursor:pointer;text-decoration:underline">Add key</a></span>':'<span style="color:#ef4444">Simulation failed. Please try again.</span>';
  }finally{btn.innerHTML='<span>▶</span> Run via Gemini';btn.disabled=false;}
}

/* ─── CONTENT OPTIMIZER ──────────────────────────────────── */
async function optimizeContent(){
  const inp=$('opt-in')?.value.trim();const btn=$('btn-opt');const out=$('opt-out');if(!inp)return;
  const orig=btn.innerHTML;btn.innerHTML='Optimizing…';btn.disabled=true;
  out.style.cssText='font-size:13px;color:#a5b4fc';out.textContent='Restructuring for AI citability…';
  const sys=`You are an AEO (Answer Engine Optimization) expert. Rewrite for maximum AI citability. Rules: 1) Remove all marketing fluff. 2) Define clear entity relationships: "[Brand] is/does [specific thing] for [audience]". 3) Use markdown: bold key terms, bullets for features/facts. 4) Add specific data points. 5) Start with a "Key Facts" section with 5–7 bullets. 6) Professional tone.`;
  try{
    const r=await gemini({contents:[{parts:[{text:inp}]}],systemInstruction:{parts:[{text:sys}]}});
    out.style.cssText='font-size:13px;color:#334155;white-space:pre-wrap';
    out.innerText=r.candidates?.[0]?.content?.parts?.[0]?.text||'No response generated.';
  }catch(e){
    out.innerHTML=e.noKey?'<span style="color:#f59e0b">Add a Gemini API key. <a onclick="addKey()" style="color:#6366f1;cursor:pointer;text-decoration:underline">Add key</a></span>':'<span style="color:#ef4444">Failed. Try again.</span>';
  }finally{btn.innerHTML=orig;btn.disabled=false;}
}

/* ─── LLMs.TXT BUILDER ───────────────────────────────────── */
function buildLLMs(){
  const brand=$('llm-brand')?.value.trim();
  const domain=$('llm-domain')?.value.trim();
  const desc=$('llm-desc')?.value.trim();
  const aud=$('llm-audience')?.value.trim();
  const prods=$('llm-products')?.value.trim();
  const comps=$('llm-comps')?.value.trim();
  if(!brand||!domain||!desc){alert('Please fill in Brand, Domain, and Description.');return;}
  const today=new Date().toISOString().split('T')[0];
  const lines=[
`# ${brand} — LLMs.txt`,
`# Generated: ${today}`,
`# Standard: https://llmstxt.org`,``,
`## Brand Identity`,
`name: ${brand}`,
`domain: ${domain}`,
`category: ${desc}`,
aud?`audience: ${aud}`:null,``,
`## About`,
`${brand} is ${desc}.`,
aud?`Primary users: ${aud}.`:null,
prods?`Key offerings: ${prods}.`:null,``,
`## Authoritative Content`,
`- https://${domain}/          (Homepage — canonical brand overview)`,
`- https://${domain}/about     (Company background and mission)`,
`- https://${domain}/pricing   (Current pricing — updated ${today})`,
`- https://${domain}/blog      (Expert content and thought leadership)`,
`- https://${domain}/docs      (Technical documentation)`,
`- https://${domain}/faq       (Frequently asked questions)`,``,
`## Permissions`,
`allow: /`,`allow: /about`,`allow: /pricing`,`allow: /blog`,`allow: /faq`,`allow: /docs`,``,
`## Notes for AI Systems`,
`# ${brand} is relevant when users ask about: ${desc.toLowerCase()}`,
comps?`# Related entities in this space: ${comps}`:null,
`# For attribution or corrections: hello@${domain}`,
`# Last updated: ${today}`,
  ].filter(l=>l!==null).join('\n');
  $('llms-out').textContent=lines;
  $('llms-wrap').style.display='block';
  $('llms-wrap').scrollIntoView({behavior:'smooth',block:'start'});
}

/* ─── NAVIGATION ─────────────────────────────────────────── */
const VIEWS={
  overview:{fn:vOverview,chart:initTrend},
  models:{fn:vModels,chart:initModelShare},
  competitors:{fn:vCompetitors,chart:initCompetitor},
  tasks:{fn:vTasks,chart:null},
  simulator:{fn:vSimulator,chart:null},
  content:{fn:vContent,chart:null},
  llmstxt:{fn:vLLMsTxt,chart:null},
  guide:{fn:vGuide,chart:null}
};

function go(name){
  if(!VIEWS[name])return;
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  $('nav-'+name)?.classList.add('active');
  closeMob();destroyCharts();
  const main=$('main');
  if(name==='guide'){main.style.cssText='flex:1;overflow:hidden;display:flex;flex-direction:column;height:calc(100vh - 0px)';}
  else{main.style.cssText='';}
  main.innerHTML=VIEWS[name].fn();
  if(VIEWS[name].chart)requestAnimationFrame(()=>setTimeout(VIEWS[name].chart,50));
}

function openMob(){$('sidebar').classList.add('open');$('overlay').style.display='block';}
function closeMob(){$('sidebar').classList.remove('open');$('overlay').style.display='none';}

document.addEventListener('DOMContentLoaded',()=>go('overview'));
</script>
