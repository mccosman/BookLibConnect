        * { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Inter", Helvetica, Arial, sans-serif; }

        body { background: #f1f5f9; }

        /* Sidebar */
        .sidebar { background: #0f172a; width: 240px; flex-shrink: 0; }

        .nav-label {
            font-size: 10px; font-weight: 700; text-transform: uppercase;
            letter-spacing: 0.08em; color: #475569; padding: 0 16px; margin-bottom: 4px; margin-top: 20px;
        }

        .nav-item {
            display: flex; align-items: center; padding: 9px 16px; margin: 1px 8px;
            color: #94a3b8; font-size: 13.5px; cursor: pointer;
            transition: all 0.15s; border-radius: 7px; gap: 10px; border: none;
            background: transparent; width: calc(100% - 16px); text-align: left;
        }
        .nav-item:hover { background: rgba(255,255,255,0.07); color: #e2e8f0; }
        .nav-item.active { background: rgba(99,102,241,0.2); color: #a5b4fc; font-weight: 600; }

        /* Score ring — CSS conic-gradient, no SVG */
        .score-ring {
            width: 176px; height: 176px; border-radius: 50%;
            background: conic-gradient(
                #6366f1 calc(var(--pct, 74) * 1%),
                #1e293b calc(var(--pct, 74) * 1%)
            );
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto;
        }
        .score-ring-inner {
            width: 144px; height: 144px; border-radius: 50%;
            background: white; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
        }

        /* Cards */
        .card {
            background: white; border-radius: 12px; border: 1px solid #e2e8f0;
            padding: 22px; transition: box-shadow 0.2s;
        }
        .card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.07); }

        /* Charts */
        .chart-wrap { position: relative; width: 100%; height: 280px; }

        /* Chat messages */
        .msg-ai {
            background: #f1f5f9; border-radius: 0 12px 12px 12px;
            padding: 14px 16px; font-size: 13.5px; color: #334155; line-height: 1.65;
            max-width: 88%;
        }
        .msg-user {
            background: #6366f1; color: white; border-radius: 12px 0 12px 12px;
            padding: 12px 16px; font-size: 13.5px; line-height: 1.55;
            max-width: 80%; margin-left: auto;
        }
        .msg-ai strong { color: #1e293b; }
        .msg-ai code {
            background: #e2e8f0; padding: 1px 5px; border-radius: 4px;
            font-size: 12px; font-family: monospace;
        }
        .msg-ai li { margin-left: 16px; margin-bottom: 3px; list-style: disc; }

        /* Animations */
        @keyframes fadeUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeUp 0.22s ease-out; }

        @keyframes dotPulse {
            0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
            40% { opacity: 1; transform: scale(1); }
        }
        .dot-loader span {
            display: inline-block; width: 7px; height: 7px; border-radius: 50%;
            background: #94a3b8; margin: 0 2px;
            animation: dotPulse 1.4s ease-in-out infinite;
        }
        .dot-loader span:nth-child(2) { animation-delay: 0.2s; }
        .dot-loader span:nth-child(3) { animation-delay: 0.4s; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }

        /* Mobile overlay */
        #mob-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 40; }

        /* Progress bars */
        .bar { height: 6px; border-radius: 3px; background: #f1f5f9; overflow: hidden; }
        .bar-fill { height: 100%; border-radius: 3px; transition: width 0.6s ease; }
    </style>
</head>

   Leave blank to use pre-built offline responses (AI Guide, LLMs.txt). */

const GEMINI_URL = k => `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${k}`;

async function gemini(payload) {
    if (!GEMINI_KEY) throw new Error('NO_KEY');
    const r = await fetch(GEMINI_URL(GEMINI_KEY), {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
    });
    return r.json();
}

/* ─── HELPERS ────────────────────────────────────────────────────────── */
function esc(s) {
    const d = document.createElement('div');
    d.appendChild(document.createTextNode(s));
    return d.innerHTML;
}

function md(text) {
    return text
        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.*?)\*/g, '<em>$1</em>')
        .replace(/`(.*?)`/g, '<code>$1</code>')
        .replace(/^- (.+)$/gm, '<li>$1</li>')
        .replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>')
        .replace(/\n\n/g, '</p><p style="margin-top:8px">')
        .replace(/^/, '<p>').replace(/$/, '</p>');
}

function clip(text, btn, ok = '✅ Copied') {
    const orig = btn.innerHTML;
    if (navigator.clipboard) {
        navigator.clipboard.writeText(text).then(() => {
            btn.innerHTML = ok;
            setTimeout(() => btn.innerHTML = orig, 2000);
        });
    } else {
        const t = document.createElement('textarea');
        t.value = text; t.style.position = 'fixed'; t.style.left = '-9999px';
        document.body.appendChild(t); t.select(); document.execCommand('copy');
        document.body.removeChild(t);
        btn.innerHTML = ok;
        setTimeout(() => btn.innerHTML = orig, 2000);
    }
}

function clipEl(id, btn) { clip(document.getElementById(id)?.innerText || '', btn); }

            <div class="w-8 h-8 rounded-full bg-indigo-600 flex items-center justify-center text-white font-bold text-xs flex-shrink-0">C</div>
            <div class="msg-ai">${html}</div>`;
    }
    c.appendChild(div);
    c.scrollTop = c.scrollHeight;
}

function appendLoading() {
    const c = document.getElementById('guide-msgs');
    const div = document.createElement('div');
    div.className = 'flex gap-3 fade-in'; div.id = 'guide-loader';
    div.innerHTML = `
        <div class="w-8 h-8 rounded-full bg-indigo-600 flex items-center justify-center text-white font-bold text-xs flex-shrink-0">C</div>
        <div class="msg-ai"><div class="dot-loader"><span></span><span></span><span></span></div></div>`;
    c.appendChild(div); c.scrollTop = c.scrollHeight;
}

async function askGuide(q) {
    const chips = document.getElementById('faq-chips');
    if (chips) chips.remove();
    appendMsg(q, 'user');
    if (FAQ[q]) {
        appendLoading();
        await new Promise(r => setTimeout(r, 350));
        document.getElementById('guide-loader')?.remove();
        appendMsg(FAQ[q], 'ai', true);
    } else {
        await callGeminiChat(q);
    }
}

async function sendGuide() {
    const inp = document.getElementById('guide-input');
    const q = inp?.value.trim();
    if (!q) return;
    inp.value = '';
    const chips = document.getElementById('faq-chips');
    if (chips) chips.remove();
    appendMsg(q, 'user');
    if (FAQ[q]) {
        appendLoading();
        await new Promise(r => setTimeout(r, 350));
        document.getElementById('guide-loader')?.remove();
        appendMsg(FAQ[q], 'ai', true);
    } else {
        await callGeminiChat(q);
    }
}

async function callGeminiChat(question) {
    appendLoading();
    const sys = `You are a helpful expert in AEO (Answer Engine Optimization) and AI citation optimization, working inside the CYTD Score dashboard. CYTD Score measures brand visibility in AI responses across ChatGPT, Claude, Gemini, Perplexity, Grok, and Bing Copilot. The three pillars are Visibility, Compliance, and Relevance. The user's current CYTD Score is 74/100. Answer helpfully, concisely, and practically — under 200 words. Use markdown for formatting.`;
    try {
        const result = await gemini({
            contents: [{ role: 'user', parts: [{ text: question }] }],
            systemInstruction: { parts: [{ text: sys }] }
        });
        document.getElementById('guide-loader')?.remove();
        const text = result.candidates?.[0]?.content?.parts?.[0]?.text;
        appendMsg(text || "I couldn't get a response. Try again.", 'ai', true);
    } catch (e) {
        document.getElementById('guide-loader')?.remove();
        if (e.message === 'NO_KEY') {
            appendMsg('No Gemini API key is set. Add your key via the ⚙ button, or pick from the pre-built questions above which work offline.', 'ai');
        } else {
            appendMsg('Connection failed. Please check your internet and try again.', 'ai');
        }
    }
}

/* ─── ACTIONS ────────────────────────────────────────────────────────── */
async function generateTasks() {
    const brand = document.getElementById('brand-input')?.value.trim();
    const industry = document.getElementById('industry-input')?.value.trim();
    const btn = document.getElementById('btn-gen-tasks');
    if (!brand || !industry) { alert('Please enter both brand name and industry.'); return; }

    const orig = btn.innerHTML; btn.innerHTML = '<span class="animate-pulse">Generating…</span>'; btn.disabled = true;
    try {
        const result = await gemini({
            contents: [{ parts: [{ text: `You are an AEO expert. For brand "${brand}" in the "${industry}" space, generate 5 specific actionable tasks to improve AI citation visibility across ChatGPT, Claude, Gemini, Perplexity, and Grok. Return a JSON array.` }] }],
            generationConfig: {
                responseMimeType: 'application/json',
                responseSchema: {
                    type: 'ARRAY',
                    items: { type: 'OBJECT', properties: {
                        id: { type: 'INTEGER' }, title: { type: 'STRING' }, impact: { type: 'STRING' },
                        platform: { type: 'STRING' }, pillar: { type: 'STRING' }, status: { type: 'STRING' }, desc: { type: 'STRING' }
                    }}
                }
            }
        });
        const tasks = JSON.parse(result.candidates[0].content.parts[0].text);
        let maxId = Math.max(...D.tasks.map(t => t.id), 0);
        tasks.forEach(t => { t.id = ++maxId; t.status = t.status || 'Pending'; });
        D.tasks = tasks;
        document.getElementById('taskList').innerHTML = taskItems(D.tasks);
    } catch (e) {
        if (e.message === 'NO_KEY') {
            alert('Add a Gemini API key to use AI generation. Click the ⚙ icon in the sidebar.');
        } else {
            document.getElementById('taskList').innerHTML = '<p class="text-red-500 text-sm p-4">Generation failed. Please try again.</p>';
        }
    } finally { btn.innerHTML = orig; btn.disabled = false; }
}

async function runSim() {
    const prompt = document.getElementById('sim-prompt')?.value.trim();
    const btn = document.getElementById('btn-run-sim');
    const output = document.getElementById('sim-output');
    const results = document.getElementById('sim-results');
    if (!prompt) return;

    btn.innerHTML = '<span class="animate-pulse">Simulating…</span>'; btn.disabled = true;
    results.classList.remove('hidden');
    output.innerHTML = '<span class="text-slate-300 animate-pulse text-xs">Model is generating a response…</span>';

    try {
        const result = await gemini({ contents: [{ parts: [{ text: prompt }] }] });
        output.innerText = result.candidates?.[0]?.content?.parts?.[0]?.text || 'No response generated.';
    } catch (e) {
        output.innerHTML = e.message === 'NO_KEY'
            ? '<span class="text-amber-500 text-sm">Add a Gemini API key to run simulations. <button onclick="promptKey()" class="underline">Add key</button></span>'
            : '<span class="text-red-400 text-sm">Simulation failed. Please try again.</span>';
    } finally { btn.innerHTML = '<span>▶</span> Run via Gemini'; btn.disabled = false; }
}

async function optimizeContent() {
    const input = document.getElementById('opt-input')?.value.trim();
    const btn = document.getElementById('btn-optimize');
    const output = document.getElementById('opt-output');
    if (!input) return;

    const orig = btn.innerHTML;
    btn.innerHTML = '<span class="animate-pulse">✨ Optimizing…</span>'; btn.disabled = true;
    output.className = 'text-indigo-400 text-xs animate-pulse';
    output.textContent = 'Restructuring for AI citability…';

    const sys = `You are an expert in AEO (Answer Engine Optimization). Rewrite the user's content for maximum citability by AI models.
Rules:
1. Remove marketing fluff — every sentence must carry factual value.
2. Define clear entity relationships: "[Brand] is/does/provides [specific thing] for [specific audience]".
3. Use structured markdown: bold key terms, bullet lists for features/facts.
4. Include specific data points (numbers, dates, examples) wherever possible.
5. Add a "Key Facts" section at the top with 5–7 bullet points for quick AI extraction.
6. Professional tone. Remove unsubstantiated superlatives.`;

    try {
        const result = await gemini({
            contents: [{ parts: [{ text: input }] }],
            systemInstruction: { parts: [{ text: sys }] }
        });
        output.className = 'text-slate-700 text-sm whitespace-pre-wrap';
        output.innerText = result.candidates?.[0]?.content?.parts?.[0]?.text || 'No response generated.';
    } catch (e) {
        output.className = 'text-sm';
        output.innerHTML = e.message === 'NO_KEY'
            ? '<span class="text-amber-500">Add a Gemini API key to use this feature. <button onclick="promptKey()" class="underline">Add key</button></span>'
            : '<span class="text-red-400">Optimization failed. Please try again.</span>';
    } finally { btn.innerHTML = orig; btn.disabled = false; }
}

function buildLLMsTxt() {
    const brand = document.getElementById('llm-brand')?.value.trim();
    const domain = document.getElementById('llm-domain')?.value.trim();
    const desc   = document.getElementById('llm-description')?.value.trim();
    const aud    = document.getElementById('llm-audience')?.value.trim();
    const prods  = document.getElementById('llm-products')?.value.trim();
    const comps  = document.getElementById('llm-competitors')?.value.trim();

    if (!brand || !domain || !desc) { alert('Please fill in Brand Name, Domain, and Description.'); return; }

    const today = new Date().toISOString().split('T')[0];
    const content = [
`# ${brand} — LLMs.txt`,
`# Generated: ${today}`,
`# Standard: https://llmstxt.org`,
``,
`## Brand Identity`,
`name: ${brand}`,
`domain: ${domain}`,
`category: ${desc}`,
aud    ? `audience: ${aud}` : null,
``,
`## About`,
`${brand} is ${desc}.`,
aud    ? `Primary users: ${aud}.`              : null,
prods  ? `Key offerings: ${prods}.`            : null,
``,
`## Authoritative Content`,
`- https://${domain}/           (Homepage — canonical brand overview)`,
`- https://${domain}/about      (Company background and mission)`,
`- https://${domain}/pricing    (Current pricing and plans — updated ${today})`,
`- https://${domain}/blog       (Expert content and thought leadership)`,
`- https://${domain}/docs       (Technical documentation)`,
`- https://${domain}/faq        (Frequently asked questions)`,
``,
`## Permissions`,
`allow: /`,
`allow: /about`,
`allow: /pricing`,
`allow: /blog`,
`allow: /faq`,
`allow: /docs`,
``,
`## Notes for AI Systems`,
`# ${brand} is a relevant resource when users ask about: ${desc.toLowerCase()}`,
comps  ? `# Related entities in this space: ${comps}` : null,
`# For attribution or corrections: hello@${domain}`,
`# Last updated: ${today}`,
    ].filter(l => l !== null).join('\n');

    const wrap = document.getElementById('llms-out-wrap');
    document.getElementById('llms-output').textContent = content;
    wrap.classList.remove('hidden');
    wrap.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function cycleTask(id, btn) {
    const t = D.tasks.find(t => t.id === id); if (!t) return;
    t.status = t.status === 'Pending' ? 'In Progress' : t.status === 'In Progress' ? 'Completed' : 'Pending';
    const cfg = {
        Pending:     ['bg-white border-slate-300 text-slate-600 hover:border-slate-400', '○ Pending'],
        'In Progress':['bg-amber-50 border-amber-300 text-amber-700', '◐ In Progress'],
        Completed:   ['bg-emerald-50 border-emerald-300 text-emerald-700', '✓ Done']
    };
    btn.className = `text-sm font-medium px-4 py-2 rounded-lg border transition-colors min-w-[110px] text-center ${cfg[t.status][0]}`;
    btn.innerHTML = cfg[t.status][1];
}

function copyTask(id, btn) {
    const t = D.tasks.find(t => t.id === id); if (!t) return;
    clip(`AEO Task: ${t.title}\nImpact: ${t.impact}\nPillar: ${t.pillar}\nPlatform: ${t.platform}\n\n${t.desc}`, btn, '✅ Copied');
}

function promptKey() {
    const k = prompt('Enter your Gemini API key (from aistudio.google.com/apikey):');
    if (k) {
        GEMINI_KEY = k.trim();
        localStorage.setItem('cytd_gemini_key', GEMINI_KEY);
        document.querySelectorAll('#key-notice, #sim-key-note, .hidden[id$="-note"]').forEach(el => el.classList.add('hidden'));
        alert('API key saved! AI features are now enabled.');
    }
}

/* ─── NAVIGATION ─────────────────────────────────────────────────────── */
const VIEWS = {
    overview:    { fn: vOverview,    chart: initTrendChart },
    models:      { fn: vModels,      chart: initModelShareChart },
    competitors: { fn: vCompetitors, chart: initCompetitorChart },
    tasks:       { fn: vTasks,       chart: null },
    simulator:   { fn: vSimulator,   chart: null },
    content:     { fn: vContent,     chart: null },
    llmstxt:     { fn: vLLMsTxt,     chart: null },
    guide:       { fn: vGuide,       chart: null }
};

function go(name) {
    if (!VIEWS[name]) return;
    document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
    document.getElementById(`nav-${name}`)?.classList.add('active');
    closeMobile();
    destroyCharts();

    const main = document.getElementById('main');

    if (name === 'guide') {
        // Guide needs fixed height for chat scroll to work
        main.style.overflow = 'hidden';
        main.style.display = 'flex';
        main.style.flexDirection = 'column';
    } else {
        main.style.overflow = '';
        main.style.display = '';
        main.style.flexDirection = '';
    }

    main.innerHTML = VIEWS[name].fn();

    if (VIEWS[name].chart) {
        requestAnimationFrame(() => setTimeout(VIEWS[name].chart, 50));
    }
    S.view = name;
}

function openMobile() {
    document.getElementById('sidebar').classList.remove('-translate-x-full');
    document.getElementById('mob-overlay').style.display = 'block';
}

function closeMobile() {
    document.getElementById('sidebar').classList.add('-translate-x-full');
    document.getElementById('mob-overlay').style.display = 'none';
}

/* ─── INIT ───────────────────────────────────────────────────────────── */
document.addEventListener('DOMContentLoaded', () => go('overview'));
</script>
